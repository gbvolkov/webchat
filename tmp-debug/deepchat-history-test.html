<!doctype html>
<html>
<body>
  <deep-chat id="chat"></deep-chat>
  <script type="module">
    import 'http://127.0.0.1:41731/node_modules/deep-chat/dist/deepChat.js';
    const chat = document.getElementById('chat');
    chat.style.width = '800px';
    chat.style.height = '600px';
    chat.connect = {};
    const history1 = [
      { role: 'assistant', text: 'Здравствуйте. Помогу быстро понять, какие решения ГАЗ подойдут под вашу задачу и какие есть финансовые варианты.' }
    ];
    const history2 = [
      { role: 'assistant', text: 'Здравствуйте. Помогу быстро понять, какие решения ГАЗ подойдут под вашу задачу и какие есть финансовые варианты.' }
    ];
    setTimeout(() => { chat.history = history1; }, 50);
    setTimeout(() => { chat.history = history2; }, 250);
    setTimeout(() => {
      const root = chat.shadowRoot;
      const bubbles = root ? root.querySelectorAll('.message-bubble') : [];
      const texts = [...bubbles].map((el) => el.textContent.trim());
      document.body.setAttribute('data-bubble-count', String(bubbles.length));
      document.body.setAttribute('data-bubbles', JSON.stringify(texts));
    }, 800);
  </script>
</body>
</html>
